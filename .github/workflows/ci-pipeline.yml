name: CI Pipeline

#  Điều kiện thực thi
on:
    push:
        branches:
            - dev

jobs:

    verify-code:
        runs-on: ubuntu-latest
        steps:
            - name: check-out code from GitHub
              uses: actions/checkout@v4

            - name: Setup Mise to get the right version env
              uses: jdx/mise-action@v2
              with:
                experimental: true

            - name: Install Dependencies for NextJS
              run: |
                cd apps/frontend-nextjs
                pnpm install --frozen-lockfile

            - name: Run Lint and check Code error
              run: |
                cd apps/frontend-nextjs
                pnpm test
                pnpm link --dirsrc

            - name: Test Backend Spring Boot
              run: |
                cd apps/backend-spring
                chmod +x mvnw
                ./mvnw clean test