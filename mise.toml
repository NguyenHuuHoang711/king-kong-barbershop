# ==============================================================================
# MISE ENVIRONMENT CONFIGURATION (ENTERPRISE MONOREPO BOILERPLATE)
# Quản lý tập trung và phân tách môi trường theo vai trò (Role-Based Environments)
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. PROFILE: DEFAULT (Bộ công cụ cốt lõi, ai trong dự án cũng phải dùng)
# ------------------------------------------------------------------------------
[tools]
node = "20.11.0" # Cả NextJS Frontend và DevOps đều cần Node để chạy
pnpm = "latest"

# ------------------------------------------------------------------------------
# 2. PROFILE: APP-DEV (Chỉ dành cho các Developer code Spring Boot + NestJS)
# Triển khai bằng cách chạy: mise install --profile app-dev
# ------------------------------------------------------------------------------
[profiles.dev.tools]
java      = "temurin-17.0.10"
# maven   = "3.9.6" # Nếu bạn muốn khóa luôn version Maven

# ------------------------------------------------------------------------------
# 3. PROFILE: DEVOPS (Chỉ dành cho Kỹ sư Hệ thống cấu hình Proxmox, mạng, CI/CD)
# Triển khai bằng cách chạy: mise install --profile devops
# ------------------------------------------------------------------------------
[profiles.devops.tools]
terraform = "1.15.3"
kubectl   = "1.28"
ansible   = "2.20.5"

# ==============================================================================
# TỰ ĐỘNG KHAI BÁO BIẾN MÔI TRƯỜNG CHO DEV APP
# ==============================================================================
[profiles.app-dev.env]
JAVA_HOME = "{{config_root}}/.local/share/mise/installs/java/temurin-17.0.10"